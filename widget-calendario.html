<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget · Calendario Mensual</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Serif JP', serif;
    padding: 16px;
  }

  .widget {
    width: 100%;
    max-width: 420px;
    background: rgba(253, 250, 246, 0.95);
    border: 1px solid #ede4d4;
    border-radius: 16px;
    padding: 22px 24px;
    box-shadow: 0 4px 24px rgba(180, 140, 120, 0.10);
    animation: aparecer 0.6s ease both;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .widget::before {
    content: '';
    display: block;
    height: 3px;
    border-radius: 2px;
    margin: -22px -24px 20px;
    background: linear-gradient(to right, #b8cbb4, #c4b8d8, #d4849e);
  }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .mes-titulo {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: #2e2420;
    letter-spacing: 0.04em;
  }

  .nav-btns { display: flex; gap: 4px; }

  .nav-btn {
    background: none;
    border: 1px solid #ede4d4;
    border-radius: 8px;
    width: 28px; height: 28px;
    font-size: 13px;
    color: #9a8f82;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: #fce8f0; border-color: #d4849e; color: #d4849e; }

  /* Grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 4px;
  }

  .dia-nombre {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 3px 0 8px;
    text-transform: uppercase;
  }

  .dia-nombre.fin { color: #d4849e; }

  .dia {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 12px;
    color: #4a3c30;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    gap: 2px;
    border: 1px solid transparent;
  }

  .dia:hover:not(.vacio) { background: rgba(252,232,240,0.6); }
  .dia.hoy { background: #d4849e; color: white; }
  .dia.hoy:hover { background: #c0607a; }
  .dia.seleccionado { background: #f0ecfb; border-color: #c4b8d8; color: #7050b0; }
  .dia.otro-mes { color: #c8b8a8; }
  .dia.vacio { pointer-events: none; cursor: default; }
  .dia.tiene-nota::after {
    content: '✦';
    font-size: 6px;
    color: #c4b8d8;
    position: absolute;
    bottom: 2px;
  }
  .dia.hoy.tiene-nota::after { color: rgba(255,255,255,0.7); }

  /* Evento dot */
  .evento-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Panel nota */
  .nota-panel {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed #ede4d4;
    animation: slideDown 0.25s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nota-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .nota-titulo {
    font-size: 10px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .nota-titulo em {
    color: #d4849e;
    font-style: italic;
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    text-transform: none;
    letter-spacing: 0.02em;
  }

  .nota-cerrar {
    background: none;
    border: none;
    font-size: 13px;
    color: #c8b8a8;
    cursor: pointer;
    transition: color 0.15s;
    padding: 2px 4px;
  }
  .nota-cerrar:hover { color: #9a8f82; }

  .nota-input {
    width: 100%;
    background: #fdfaf6;
    border: 1px solid #ede4d4;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12.5px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    color: #2e2420;
    font-style: italic;
    line-height: 1.65;
    resize: none;
    outline: none;
    min-height: 58px;
    transition: border-color 0.2s;
  }
  .nota-input:focus { border-color: #d4849e; }
  .nota-input::placeholder { color: #c8b8a8; }

  /* Eventos del mes */
  .eventos-mes {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .evento-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    color: #4a3c30;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    padding: 5px 8px;
    border-radius: 7px;
    background: #fdfaf6;
    border: 1px solid #ede4d4;
  }

  .evento-badge {
    font-size: 9.5px;
    padding: 2px 7px;
    border-radius: 8px;
    flex-shrink: 0;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .badge-rosa { background: #fce8f0; color: #b0607a; border: 1px solid #d4849e; }
  .badge-sage { background: #eaf4e8; color: #507048; border: 1px solid #b8cbb4; }
  .badge-lav  { background: #f0ecfb; color: #7050b0; border: 1px solid #c4b8d8; }
  .badge-warm { background: #fdf0e0; color: #8a6020; border: 1px solid #c8a882; }

  /* Stats mini */
  .stats-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed #ede4d4;
  }

  .stat-mini {
    flex: 1;
    background: #fdfaf6;
    border: 1px solid #ede4d4;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }

  .stat-mini-num {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    font-weight: 300;
    color: #2e2420;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-mini-label {
    font-size: 8.5px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .deco {
    text-align: center;
    font-size: 10px;
    color: #c4b8d8;
    letter-spacing: 0.3em;
    margin-top: 14px;
  }
</style>
</head>
<body>
<div class="widget">

  <div class="nav">
    <div class="mes-titulo" id="mes-titulo">Abril 2025</div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="cambiarMes(-1)">‹</button>
      <button class="nav-btn" onclick="cambiarMes(1)">›</button>
    </div>
  </div>

  <div class="cal-grid" id="cal-grid"></div>

  <div id="nota-panel-wrapper"></div>

  <div class="eventos-mes" id="eventos-mes"></div>

  <div class="stats-row" id="stats-row"></div>

  <div class="deco">✿ ── ✦ ── ✿</div>
</div>

<script>
// ── CONFIGURA TUS EVENTOS AQUÍ ✿ ──
// formato: númeroDeDía: { texto, estilo }
const EVENTOS_CONFIG = {
  5:  { texto: 'subir widgets a GitHub 🌸',  estilo: 'badge-rosa' },
  12: { texto: 'publicar en Gumroad ✦',       estilo: 'badge-lav'  },
  20: { texto: 'primer video UGC 🎥',         estilo: 'badge-sage' },
  28: { texto: 'revisión mensual 📝',         estilo: 'badge-warm' },
};

const HOY      = new Date();
const HOY_STR  = HOY.toDateString();
let calFecha   = new Date(HOY.getFullYear(), HOY.getMonth(), 1);
let diaActivo  = null;

const NOMBRES_MES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                     'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_CORTO = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

const guardar = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} };
const leer    = (k,d) => { try { const v=localStorage.getItem(k); return v!==null?JSON.parse(v):d; } catch(e){return d;} };

function render() {
  const anio = calFecha.getFullYear();
  const mes  = calFecha.getMonth();

  document.getElementById('mes-titulo').textContent = `${NOMBRES_MES[mes]} ${anio}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Cabecera
  ['L','M','X','J','V','S','D'].forEach((n,i) => {
    const el = document.createElement('div');
    el.className = 'dia-nombre' + (i >= 5 ? ' fin' : '');
    el.textContent = n;
    grid.appendChild(el);
  });

  // Offset inicio
  let inicio = new Date(anio, mes, 1).getDay();
  inicio = inicio === 0 ? 6 : inicio - 1;

  // Días mes anterior
  const diasMesAnt = new Date(anio, mes, 0).getDate();
  for (let i = inicio - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'dia otro-mes vacio';
    el.textContent = diasMesAnt - i;
    grid.appendChild(el);
  }

  // Días del mes
  const totalDias = new Date(anio, mes + 1, 0).getDate();
  for (let d = 1; d <= totalDias; d++) {
    const el = document.createElement('div');
    el.className = 'dia';

    const esHoy = d === HOY.getDate() && mes === HOY.getMonth() && anio === HOY.getFullYear();
    const esSel = diaActivo && diaActivo.d === d && diaActivo.m === mes && diaActivo.a === anio;
    const claveNota = `nota_cal_${anio}_${mes}_${d}`;
    const tieneNota = leer(claveNota, '') !== '';

    if (esHoy)     el.classList.add('hoy');
    if (esSel)     el.classList.add('seleccionado');
    if (tieneNota) el.classList.add('tiene-nota');

    el.innerHTML = `<span>${d}</span>`;

    // Dot de evento
    if (EVENTOS_CONFIG[d]) {
      const dot = document.createElement('div');
      dot.className = 'evento-dot';
      const colorMap = {
        'badge-rosa': '#d4849e', 'badge-sage': '#88aa80',
        'badge-lav':  '#a898c8', 'badge-warm': '#c8a060'
      };
      dot.style.background = colorMap[EVENTOS_CONFIG[d].estilo] || '#c8b8a8';
      el.appendChild(dot);
    }

    el.onclick = () => seleccionar(d, mes, anio);
    grid.appendChild(el);
  }

  // Días del siguiente mes
  const total = inicio + totalDias;
  const resto = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= resto; i++) {
    const el = document.createElement('div');
    el.className = 'dia otro-mes vacio';
    el.textContent = i;
    grid.appendChild(el);
  }

  // Eventos del mes
  renderEventos(mes, anio);

  // Stats
  renderStats(mes, anio, totalDias);

  // Si hay día activo, re-render nota
  if (diaActivo && diaActivo.m === mes && diaActivo.a === anio) {
    renderNota(diaActivo.d, mes, anio);
  } else {
    document.getElementById('nota-panel-wrapper').innerHTML = '';
  }
}

function seleccionar(d, m, a) {
  if (diaActivo && diaActivo.d === d && diaActivo.m === m && diaActivo.a === a) {
    diaActivo = null;
    document.getElementById('nota-panel-wrapper').innerHTML = '';
    render();
    return;
  }
  diaActivo = { d, m, a };
  render();
}

function renderNota(d, m, a) {
  const wrapper = document.getElementById('nota-panel-wrapper');
  const clave   = `nota_cal_${a}_${m}_${d}`;
  const nota    = leer(clave, '');
  const nombreMes = NOMBRES_MES[m];

  wrapper.innerHTML = `
    <div class="nota-panel">
      <div class="nota-header">
        <div class="nota-titulo">✦ nota · <em>${d} de ${nombreMes}</em></div>
        <button class="nota-cerrar" onclick="cerrarNota()">✕</button>
      </div>
      <textarea class="nota-input" id="nota-input"
        placeholder="escribe algo para este día... ✿"
        rows="2">${nota}</textarea>
    </div>`;

  const input = document.getElementById('nota-input');
  input.oninput = () => {
    guardar(clave, input.value);
    // Actualizar punto de nota sin re-render completo
    const esVacia = input.value.trim() === '';
    const diaEl   = [...document.querySelectorAll('.dia:not(.otro-mes)')].find(el =>
      parseInt(el.querySelector('span').textContent) === d
    );
    if (diaEl) {
      esVacia ? diaEl.classList.remove('tiene-nota') : diaEl.classList.add('tiene-nota');
    }
  };

  // Focus al final
  setTimeout(() => { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }, 50);
}

function cerrarNota() {
  diaActivo = null;
  document.getElementById('nota-panel-wrapper').innerHTML = '';
  render();
}

function renderEventos(mes, anio) {
  const el = document.getElementById('eventos-mes');
  el.innerHTML = '';
  Object.entries(EVENTOS_CONFIG).forEach(([dia, ev]) => {
    const row = document.createElement('div');
    row.className = 'evento-row';
    row.innerHTML = `
      <span class="evento-badge ${ev.estilo}">${dia} ${MESES_CORTO[mes]}</span>
      ${ev.texto}`;
    el.appendChild(row);
  });
  if (Object.keys(EVENTOS_CONFIG).length === 0) el.style.display = 'none';
}

function renderStats(mes, anio, totalDias) {
  const el = document.getElementById('stats-row');
  // Contar notas del mes
  let notasCount = 0;
  for (let d = 1; d <= totalDias; d++) {
    if (leer(`nota_cal_${anio}_${mes}_${d}`, '') !== '') notasCount++;
  }
  const diasRestantes = mes === HOY.getMonth() && anio === HOY.getFullYear()
    ? totalDias - HOY.getDate() + 1 : 0;

  el.innerHTML = `
    <div class="stat-mini">
      <div class="stat-mini-num">${totalDias}</div>
      <div class="stat-mini-label">días del mes</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-num">${Object.keys(EVENTOS_CONFIG).length}</div>
      <div class="stat-mini-label">eventos</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-num">${notasCount}</div>
      <div class="stat-mini-label">notas escritas</div>
    </div>
    ${diasRestantes > 0 ? `
    <div class="stat-mini">
      <div class="stat-mini-num" style="color:#d4849e">${diasRestantes}</div>
      <div class="stat-mini-label">días por venir</div>
    </div>` : ''}
  `;
}

function cambiarMes(dir) {
  calFecha.setMonth(calFecha.getMonth() + dir);
  diaActivo = null;
  document.getElementById('nota-panel-wrapper').innerHTML = '';
  render();
}

// Iniciar
render();

// Seleccionar hoy por defecto
seleccionar(HOY.getDate(), HOY.getMonth(), HOY.getFullYear());
</script>
</body>
</html>
