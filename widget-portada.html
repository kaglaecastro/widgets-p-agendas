<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget · Portada Animada</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100vh;
    font-family: 'Noto Serif JP', serif;
  }

  /* ── FONDO DEGRADADO ── */
  .fondo {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      160deg,
      #f5e6ee 0%,
      #ede4f0 25%,
      #e4eef0 55%,
      #e8f0e4 100%
    );
  }

  /* ── TEXTURA SUAVE ── */
  .textura {
    position: fixed;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b06080' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── CONTENIDO CENTRAL ── */
  .contenido {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    text-align: center;
    padding: 20px;
  }

  .deco-top {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(176, 96, 122, 0.6);
    text-transform: uppercase;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    animation: fadeIn 1.2s ease 0.5s both;
  }

  .titulo-portada {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 300;
    color: #2e2420;
    letter-spacing: 0.08em;
    line-height: 1.2;
    animation: fadeIn 1.2s ease 0.7s both;
  }

  .titulo-portada span { color: #b0607a; }

  .subtitulo {
    font-size: clamp(10px, 2vw, 12px);
    color: rgba(90, 74, 64, 0.55);
    letter-spacing: 0.2em;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    animation: fadeIn 1.2s ease 0.9s both;
  }

  .deco-bottom {
    font-size: 12px;
    color: rgba(176, 96, 122, 0.45);
    letter-spacing: 0.35em;
    margin-top: 4px;
    animation: fadeIn 1.2s ease 1.1s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PÉTALOS / HOJAS ── */
  .petal {
    position: fixed;
    top: -60px;
    pointer-events: none;
    z-index: 5;
    animation: caer linear infinite;
    opacity: 0;
  }

  @keyframes caer {
    0% {
      transform: translateY(0) rotate(0deg) translateX(0px);
      opacity: 0;
    }
    5%  { opacity: 1; }
    90% { opacity: 0.7; }
    100% {
      transform: translateY(110vh) rotate(720deg) translateX(60px);
      opacity: 0;
    }
  }

  /* Selector de tema */
  .selector {
    position: fixed;
    bottom: 14px;
    right: 14px;
    display: flex;
    gap: 6px;
    z-index: 20;
  }

  .tema-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid white;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    background: white;
  }

  .tema-btn:hover { transform: scale(1.15); }
  .tema-btn.activo { box-shadow: 0 0 0 2px #d4849e, 0 2px 8px rgba(0,0,0,0.2); }

  /* Fecha flotante */
  .fecha-flotante {
    position: fixed;
    bottom: 14px;
    left: 14px;
    font-size: 11px;
    color: rgba(90,74,64,0.5);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    letter-spacing: 0.1em;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="fondo" id="fondo"></div>
<div class="textura"></div>

<canvas id="canvas" style="position:fixed;inset:0;z-index:5;pointer-events:none;width:100%;height:100%;"></canvas>

<div class="contenido">
  <div class="deco-top">私のスペース · mi espacio</div>
  <div class="titulo-portada">Mi <span>Espacio</span> ✿</div>
  <div class="subtitulo">planificación · hábitos · reflexión</div>
  <div class="deco-bottom">✿ ── ✦ ── ✿</div>
</div>

<div class="fecha-flotante" id="fecha-flotante"></div>

<div class="selector">
  <button class="tema-btn activo" onclick="setTema('sakura')"  title="Sakura">🌸</button>
  <button class="tema-btn"        onclick="setTema('otoño')"   title="Otoño">🍂</button>
  <button class="tema-btn"        onclick="setTema('nieve')"   title="Nieve">❄️</button>
  <button class="tema-btn"        onclick="setTema('estrellas')" title="Estrellas">✨</button>
</div>

<script>
// ── TEMAS ──
const TEMAS = {
  sakura: {
    fondo: 'linear-gradient(160deg, #f5e6ee 0%, #ede4f0 25%, #e4eef0 55%, #e8f0e4 100%)',
    particulas: ['🌸','🌸','🌺','✿','🌷'],
    sizes: [14, 16, 18, 12, 20],
    cantidad: 18,
  },
  otoño: {
    fondo: 'linear-gradient(160deg, #f5ece0 0%, #f0e4d0 30%, #e8d8c0 60%, #ddd0b0 100%)',
    particulas: ['🍂','🍁','🍃','🍂','🌾'],
    sizes: [16, 18, 14, 20, 12],
    cantidad: 16,
  },
  nieve: {
    fondo: 'linear-gradient(160deg, #eef4f8 0%, #e8f0f8 30%, #e4ecf8 60%, #dce8f4 100%)',
    particulas: ['❄️','❄️','✦','·','❄️'],
    sizes: [14, 10, 12, 8, 16],
    cantidad: 22,
  },
  estrellas: {
    fondo: 'linear-gradient(160deg, #1a1428 0%, #221838 30%, #1c2040 60%, #182030 100%)',
    particulas: ['✦','·','⋆','✧','★'],
    sizes: [10, 6, 8, 12, 10],
    cantidad: 30,
    oscuro: true,
  },
};

let temaActual = 'sakura';
let particulas = [];

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function crearParticula(tema) {
  const t    = TEMAS[tema];
  const idx  = Math.floor(Math.random() * t.particulas.length);
  return {
    x:        Math.random() * canvas.width,
    y:        -40,
    emoji:    t.particulas[idx],
    size:     t.sizes[idx] + Math.random() * 6,
    speed:    0.6 + Math.random() * 1.2,
    drift:    (Math.random() - 0.5) * 0.8,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    opacity:  0,
    fade:     'in',
    swing:    Math.random() * Math.PI * 2,
    swingSpeed: 0.01 + Math.random() * 0.02,
    swingAmp:   20 + Math.random() * 30,
  };
}

function iniciarParticulas() {
  particulas = [];
  const t = TEMAS[temaActual];
  for (let i = 0; i < t.cantidad; i++) {
    const p = crearParticula(temaActual);
    p.y = Math.random() * canvas.height; // distribuir al inicio
    particulas.push(p);
  }
}

function actualizar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particulas.forEach((p, i) => {
    // Movimiento
    p.swing    += p.swingSpeed;
    p.x        += p.drift + Math.sin(p.swing) * 0.5;
    p.y        += p.speed;
    p.rotation += p.rotSpeed;

    // Fade in/out
    if (p.fade === 'in' && p.opacity < 1)  p.opacity += 0.02;
    if (p.y > canvas.height * 0.7)          p.fade = 'out';
    if (p.fade === 'out' && p.opacity > 0)  p.opacity -= 0.015;

    // Reset
    if (p.y > canvas.height + 40 || p.opacity <= 0) {
      particulas[i] = crearParticula(temaActual);
    }

    // Dibujar emoji
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.opacity);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
  });

  requestAnimationFrame(actualizar);
}

function setTema(nombre) {
  temaActual = nombre;
  const t = TEMAS[nombre];

  // Fondo
  document.getElementById('fondo').style.background = t.fondo;

  // Texto oscuro/claro
  const contenido = document.querySelector('.contenido');
  const deco      = document.querySelectorAll('.deco-top, .deco-bottom, .subtitulo');
  const titulo    = document.querySelector('.titulo-portada');
  const fecha     = document.getElementById('fecha-flotante');

  if (t.oscuro) {
    titulo.style.color = '#f0e8f0';
    titulo.querySelector('span').style.color = '#f0a8c0';
    deco.forEach(el => el.style.color = 'rgba(240,168,192,0.6)');
    fecha.style.color = 'rgba(220,200,220,0.5)';
  } else {
    titulo.style.color = '#2e2420';
    titulo.querySelector('span').style.color = '#b0607a';
    deco.forEach(el => el.style.color = 'rgba(176,96,122,0.55)');
    fecha.style.color = 'rgba(90,74,64,0.5)';
  }

  // Botones activos
  document.querySelectorAll('.tema-btn').forEach(b => b.classList.remove('activo'));
  event.target.closest('.tema-btn').classList.add('activo');

  // Reiniciar partículas
  iniciarParticulas();
}

// Fecha
function mostrarFecha() {
  const ahora = new Date();
  const dias  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio',
                 'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('fecha-flotante').textContent =
    `${dias[ahora.getDay()]} ${ahora.getDate()} de ${meses[ahora.getMonth()]} · ${ahora.getFullYear()}`;
}

mostrarFecha();
iniciarParticulas();
actualizar();
</script>
</body>
</html>
