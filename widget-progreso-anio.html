<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget · Progreso del Año</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 8px;
    font-family: 'Noto Serif JP', serif;
  }

  .widget { width: 100%;
    background: rgba(253, 250, 246, 0.92);
    border: 1px solid #ede4d4;
    border-radius: 16px;
    padding: 22px 26px;
    text-align: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(180, 140, 120, 0.12);
    
    
    animation: aparecer 0.7s ease both;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Línea superior degradada */
  .widget::before {
    content: '';
    display: block;
    height: 3px;
    border-radius: 2px;
    margin: -22px -26px 18px;
    background: linear-gradient(to right, #c4b8d8, #d4849e, #c8a882);
  }

  /* Título */
  .titulo {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    margin-bottom: 14px;
  }

  /* Año grande */
  .anio {
    font-size: 1rem;
    font-weight: 400;
    color: #9a8f82;
    letter-spacing: 0.2em;
    margin-bottom: 4px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* Porcentaje principal */
  .porcentaje {
    font-size: 3rem;
    font-weight: 300;
    color: #2e2420;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 2px;
  }

  .porcentaje span {
    font-size: 1.2rem;
    color: #c8a882;
    font-weight: 300;
  }

  /* Subtexto bajo porcentaje */
  .sub-pct {
    font-size: 11px;
    color: #c4b8d8;
    letter-spacing: 0.15em;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    margin-bottom: 16px;
  }

  /* Barra de progreso */
  .barra-contenedor {
    position: relative;
    margin-bottom: 10px;
  }

  .barra-fondo {
    height: 8px;
    background: #ede4d4;
    border-radius: 4px;
    overflow: hidden;
  }

  .barra-relleno {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(to right, #d4849e, #c4b8d8, #b8cbb4);
    width: 0%; /* empieza en 0, se anima con JS */
    transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  /* Brillo en la barra */
  .barra-relleno::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: rgba(255,255,255,0.3);
    border-radius: 4px 4px 0 0;
  }

  /* Indicador del día actual sobre la barra */
  .indicador {
    position: absolute;
    top: -6px;
    width: 2px;
    height: 20px;
    background: #d4849e;
    border-radius: 1px;
    transition: left 1.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .indicador::before {
    content: '✿';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #d4849e;
  }

  /* Stats de días */
  .stats {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed #ede4d4;
  }

  .stat {
    text-align: center;
    flex: 1;
  }

  .stat:not(:last-child) {
    border-right: 1px dashed #ede4d4;
  }

  .stat-num {
    font-size: 1.1rem;
    font-weight: 400;
    color: #2e2420;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-label {
    font-size: 8.5px;
    color: #9a8f82;
    letter-spacing: 0.1em;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    text-transform: uppercase;
  }

  /* Separador decorativo */
  .separador {
    font-size: 10px;
    color: #c4b8d8;
    letter-spacing: 0.3em;
    margin-top: 14px;
  }

  /* Mensaje estacional */
  .mensaje {
    font-size: 11px;
    color: #b8a898;
    font-style: italic;
    margin-top: 10px;
    line-height: 1.5;
    font-weight: 300;
  }
</style>
</head>
<body>

<div class="widget">

  <div class="titulo">✦ progreso del año ✦</div>

  <div class="anio" id="anio">2025</div>
  <div class="porcentaje" id="porcentaje">0<span>%</span></div>
  <div class="sub-pct" id="sub-pct">transcurrido</div>

  <div class="barra-contenedor">
    <div class="indicador" id="indicador" style="left:0%"></div>
    <div class="barra-fondo">
      <div class="barra-relleno" id="barra"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="dias-pasados">0</div>
      <div class="stat-label">días vividos</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="dias-restantes">365</div>
      <div class="stat-label">días por venir</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="semanas-restantes">52</div>
      <div class="stat-label">semanas</div>
    </div>
  </div>

  <div class="separador">˚ ₊ ✦ ₊ ˚</div>

  <div class="mensaje" id="mensaje">cargando...</div>

</div>

<script>
  // ── Mensajes estacionales por trimestre ──
  // Puedes cambiar estas frases por las que más te gusten ✿
  const mensajes = [
    "El año apenas florece. Todo está por escribirse. 🌱",   // Enero–Marzo
    "La primavera trae nuevos comienzos. Sigue creando. 🌸",  // Abril–Junio
    "El verano avanza. Cada día cuenta. ✦",                   // Julio–Septiembre
    "El año madura. Cosecha lo que sembraste. 🍂",            // Octubre–Diciembre
  ];

  function calcular() {
    const ahora    = new Date();
    const anio     = ahora.getFullYear();

    // Primer y último instante del año
    const inicio   = new Date(anio, 0, 1);       // 1 enero
    const fin      = new Date(anio + 1, 0, 1);   // 1 enero del año siguiente

    // Milisegundos totales del año y transcurridos
    const totalMs  = fin - inicio;
    const pasadoMs = ahora - inicio;

    // Porcentaje con 1 decimal
    const pct      = (pasadoMs / totalMs) * 100;
    const pctRedondeado = Math.floor(pct * 10) / 10; // ej: 27.3

    // Días
    const diasPasados    = Math.floor(pasadoMs / 86400000);
    const diasTotales    = Math.floor(totalMs  / 86400000);
    const diasRestantes  = diasTotales - diasPasados;
    const semanasRestantes = Math.ceil(diasRestantes / 7);

    // Trimestre para el mensaje
    const trimestre = Math.floor(ahora.getMonth() / 3); // 0,1,2,3

    // ── Actualizar el DOM ──
    document.getElementById('anio').textContent            = anio;
    document.getElementById('porcentaje').innerHTML        = `${pctRedondeado}<span>%</span>`;
    document.getElementById('dias-pasados').textContent    = diasPasados;
    document.getElementById('dias-restantes').textContent  = diasRestantes;
    document.getElementById('semanas-restantes').textContent = semanasRestantes;
    document.getElementById('mensaje').textContent         = mensajes[trimestre];

    // ── Animar barra e indicador después de un pequeño delay ──
    // (el delay hace que se vea la animación de entrada)
    setTimeout(() => {
      document.getElementById('barra').style.width       = `${pct}%`;
      document.getElementById('indicador').style.left    = `calc(${pct}% - 1px)`;
    }, 300);
  }

  // Ejecutar al cargar
  calcular();

  // Actualizar cada hora (el progreso del año no cambia cada segundo)
  setInterval(calcular, 3600000);
</script>

</body>
</html>
