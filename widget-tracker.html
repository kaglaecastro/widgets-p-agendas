<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget · Tracker de Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Serif JP', serif;
    padding: 16px;
  }

  .widget {
    width: 100%;
    max-width: 480px;
    background: rgba(253, 250, 246, 0.95);
    border: 1px solid #ede4d4;
    border-radius: 16px;
    padding: 22px 24px;
    box-shadow: 0 4px 24px rgba(180, 140, 120, 0.10);
    animation: aparecer 0.6s ease both;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .widget::before {
    content: '';
    display: block;
    height: 3px;
    border-radius: 2px;
    margin: -22px -24px 20px;
    background: linear-gradient(to right, #d4849e, #c4b8d8, #b8cbb4);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px dashed #ede4d4;
  }

  .titulo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem;
    color: #2e2420;
  }

  .semana-badge {
    font-size: 9px;
    padding: 3px 10px;
    border-radius: 10px;
    background: #fce8f0;
    color: #b0607a;
    border: 1px solid #d4849e;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.08em;
  }

  /* Cabecera días */
  .dias-cabecera {
    display: grid;
    grid-template-columns: 120px repeat(7, 1fr) 40px;
    gap: 4px;
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .dia-label {
    text-align: center;
    font-size: 9.5px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }

  .dia-label .num { display: block; font-size: 11px; color: #6a5a50; }
  .dia-label.hoy  { color: #d4849e; }
  .dia-label.hoy .num { color: #d4849e; font-weight: 400; }

  /* Fila hábito */
  .habito-fila {
    display: grid;
    grid-template-columns: 120px repeat(7, 1fr) 40px;
    gap: 4px;
    align-items: center;
    padding: 5px 2px;
    border-radius: 8px;
    transition: background 0.15s;
  }

  .habito-fila:hover { background: rgba(237,228,212,0.3); }

  .habito-nombre {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #4a3c30;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    overflow: hidden;
    white-space: nowrap;
  }

  /* Punto */
  .punto {
    width: 100%;
    aspect-ratio: 1;
    max-width: 26px;
    margin: 0 auto;
    border-radius: 50%;
    border: 1.5px solid #e8ddd0;
    background: white;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0;
    color: white;
  }

  .punto:hover { transform: scale(1.2); border-color: #c8a882; }
  .punto.activo { border-color: transparent; font-size: 9px; }

  .punto.activo.c-rosa { background: #d4849e; }
  .punto.activo.c-sage { background: #88aa80; }
  .punto.activo.c-lav  { background: #a898c8; }
  .punto.activo.c-warm { background: #c8a060; }
  .punto.activo.c-gold { background: #c8b040; }

  /* Columna pct */
  .pct-col {
    text-align: center;
  }

  .pct-num {
    font-size: 10px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    display: block;
    margin-bottom: 3px;
  }

  .mini-bar-bg {
    height: 3px;
    background: #ede4d4;
    border-radius: 2px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Separador */
  .sep {
    text-align: center;
    font-size: 10px;
    color: #c4b8d8;
    letter-spacing: 0.3em;
    margin: 14px 0 10px;
  }

  /* Resumen semanal */
  .resumen {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  @media (max-width: 400px) {
    .resumen { grid-template-columns: repeat(3, 1fr); }
  }

  .resumen-item {
    background: #fdfaf6;
    border: 1px solid #ede4d4;
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }

  .resumen-emoji { font-size: 14px; display: block; margin-bottom: 4px; }

  .resumen-barra-bg {
    height: 4px;
    background: #ede4d4;
    border-radius: 2px;
    overflow: hidden;
    margin: 0 4px 4px;
  }

  .resumen-barra-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .resumen-pct {
    font-size: 10px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
  }

  .deco {
    text-align: center;
    font-size: 10px;
    color: #c4b8d8;
    letter-spacing: 0.3em;
    margin-top: 14px;
  }
</style>
</head>
<body>
<div class="widget">

  <div class="header">
    <div class="titulo">🌱 tracker de hábitos</div>
    <div class="semana-badge" id="semana-badge">esta semana</div>
  </div>

  <div class="dias-cabecera">
    <div></div>
    <div class="dia-label" id="dl-0"></div>
    <div class="dia-label" id="dl-1"></div>
    <div class="dia-label" id="dl-2"></div>
    <div class="dia-label" id="dl-3"></div>
    <div class="dia-label" id="dl-4"></div>
    <div class="dia-label" id="dl-5"></div>
    <div class="dia-label" id="dl-6"></div>
    <div></div>
  </div>

  <div id="habitos-container"></div>

  <div class="sep">✿ ── ✦ ── ✿</div>

  <div class="resumen" id="resumen"></div>

  <div class="deco">˚ ₊ ✦ ₊ ˚</div>
</div>

<script>
// ── CONFIGURA TUS HÁBITOS AQUÍ ✿ ──
const HABITOS = [
  { emoji: '📖', nombre: 'lectura',    color: 'c-rosa' },
  { emoji: '💧', nombre: 'agua',       color: 'c-sage' },
  { emoji: '🎨', nombre: 'crear',      color: 'c-lav'  },
  { emoji: '🧘', nombre: 'calma',      color: 'c-warm' },
  { emoji: '✍🏽', nombre: 'journaling', color: 'c-gold' },
];

const COLOR_HEX = {
  'c-rosa': '#d4849e', 'c-sage': '#88aa80',
  'c-lav':  '#a898c8', 'c-warm': '#c8a060', 'c-gold': '#c8b040',
};

const HOY     = new Date();
const HOY_STR = HOY.toDateString();
const MESES   = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

// Lunes de la semana actual
function getLunes(d) {
  const f = new Date(d);
  const dia = f.getDay();
  f.setDate(f.getDate() - (dia === 0 ? 6 : dia - 1));
  f.setHours(0,0,0,0);
  return f;
}

const lunes = getLunes(HOY);
const dias  = Array.from({length:7}, (_,i) => {
  const d = new Date(lunes);
  d.setDate(lunes.getDate() + i);
  return d;
});

// Cabecera días
const nombres = ['L','M','X','J','V','S','D'];
dias.forEach((d,i) => {
  const el = document.getElementById(`dl-${i}`);
  el.innerHTML = `<span>${nombres[i]}</span><span class="num">${d.getDate()}</span>`;
  if (d.toDateString() === HOY_STR) el.classList.add('hoy');
});

// Badge de semana
const fin = new Date(lunes); fin.setDate(lunes.getDate() + 6);
document.getElementById('semana-badge').textContent =
  `${lunes.getDate()} – ${fin.getDate()} ${MESES[fin.getMonth()]}`;

// Storage
const guardar = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };
const leer    = (k,d) => { try { const v=localStorage.getItem(k); return v!==null?JSON.parse(v):d; } catch(e){return d;} };

// Render hábitos
const contenedor = document.getElementById('habitos-container');

HABITOS.forEach(hab => {
  const clave  = `hab_${hab.nombre}_${lunes.toDateString()}`;
  const estado = leer(clave, Array(7).fill(false));

  const fila = document.createElement('div');
  fila.className = 'habito-fila';

  // Nombre
  const nombreEl = document.createElement('div');
  nombreEl.className = 'habito-nombre';
  nombreEl.innerHTML = `<span>${hab.emoji}</span>${hab.nombre}`;
  fila.appendChild(nombreEl);

  // Puntos
  for (let i = 0; i < 7; i++) {
    const p = document.createElement('div');
    p.className = 'punto' + (estado[i] ? ` activo ${hab.color}` : '');
    p.textContent = estado[i] ? '✓' : '';
    p.onclick = () => {
      estado[i] = !estado[i];
      p.className = 'punto' + (estado[i] ? ` activo ${hab.color}` : '');
      p.textContent = estado[i] ? '✓' : '';
      guardar(clave, estado);
      actualizarResumen();
    };
    fila.appendChild(p);
  }

  // Pct col
  const pctCol = document.createElement('div');
  pctCol.className = 'pct-col';
  pctCol.dataset.hab = hab.nombre;
  fila.appendChild(pctCol);
  contenedor.appendChild(fila);
});

function actualizarResumen() {
  // Actualizar mini barras en filas
  document.querySelectorAll('[data-hab]').forEach(el => {
    const nombre = el.dataset.hab;
    const hab    = HABITOS.find(h => h.nombre === nombre);
    const clave  = `hab_${nombre}_${lunes.toDateString()}`;
    const estado = leer(clave, Array(7).fill(false));
    const total  = estado.filter(Boolean).length;
    const pct    = Math.round((total/7)*100);
    el.innerHTML = `
      <span class="pct-num">${pct}%</span>
      <div class="mini-bar-bg">
        <div class="mini-bar-fill" style="width:${pct}%;background:${COLOR_HEX[hab.color]}"></div>
      </div>`;
  });

  // Resumen abajo
  const resumenEl = document.getElementById('resumen');
  resumenEl.innerHTML = '';
  HABITOS.forEach(hab => {
    const clave  = `hab_${hab.nombre}_${lunes.toDateString()}`;
    const estado = leer(clave, Array(7).fill(false));
    const total  = estado.filter(Boolean).length;
    const pct    = Math.round((total/7)*100);
    resumenEl.innerHTML += `
      <div class="resumen-item">
        <span class="resumen-emoji">${hab.emoji}</span>
        <div class="resumen-barra-bg">
          <div class="resumen-barra-fill" style="width:${pct}%;background:${COLOR_HEX[hab.color]}"></div>
        </div>
        <span class="resumen-pct">${total}/7</span>
      </div>`;
  });
}

actualizarResumen();
</script>
</body>
</html>
