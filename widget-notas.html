<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget · Notas del Día</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 8px;
    font-family: 'Noto Serif JP', serif;
  }

  .widget {
    width: 100%;
    background: rgba(253,250,246,0.95);
    border: 1px solid #ede4d4;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(180,140,120,0.10);
    animation: aparecer 0.6s ease both;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Línea superior */
  .top-bar {
    height: 3px;
    background: linear-gradient(to right, #b8cbb4, #c4b8d8, #d4849e);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 14px;
    border-bottom: 1px dashed #ede4d4;
  }

  .titulo {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.9rem;
    color: #2e2420;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fecha-badge {
    font-size: 9px;
    padding: 3px 9px;
    border-radius: 10px;
    background: #eaf4e8;
    color: #406038;
    border: 1px solid #b8cbb4;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.06em;
  }

  .palabras-badge {
    font-size: 9px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.06em;
  }

  /* Área de escritura — papel rayado aesthetic */
  .papel {
    position: relative;
    padding: 0;
  }

  /* Línea roja de margen izquierdo estilo cuaderno */
  .papel::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 36px;
    width: 1px;
    background: rgba(212,132,158,0.25);
    z-index: 1;
    pointer-events: none;
  }

  .textarea-wrap {
    position: relative;
  }

  /* Líneas del papel */
  .lineas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 31px,
      rgba(237,228,212,0.7) 31px,
      rgba(237,228,212,0.7) 32px
    );
    background-position: 0 16px;
  }

  .nota-textarea {
    position: relative;
    z-index: 2;
    width: 100%;
    min-height: 160px;
    background: transparent;
    border: none;
    outline: none;
    padding: 16px 20px 16px 48px;
    font-size: 13px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    color: #2e2420;
    line-height: 32px;
    resize: none;
    letter-spacing: 0.02em;
  }

  .nota-textarea::placeholder {
    color: #c8b8a8;
    font-style: italic;
  }

  /* Footer del widget */
  .footer-widget {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-top: 1px dashed #ede4d4;
    background: rgba(253,250,246,0.8);
  }

  .footer-deco {
    font-size: 10px;
    color: #c4b8d8;
    letter-spacing: 0.25em;
  }

  .footer-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Botón navegar días */
  .nav-btn {
    background: none;
    border: 1px solid #ede4d4;
    border-radius: 7px;
    width: 26px; height: 26px;
    font-size: 12px;
    color: #9a8f82;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: #fce8f0; border-color: #d4849e; color: #d4849e; }

  .nav-fecha {
    font-size: 10px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.06em;
    min-width: 70px;
    text-align: center;
  }

  /* Indicador guardado */
  .guardado {
    font-size: 9px;
    color: #88aa80;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .guardado.visible { opacity: 1; }

  /* Panel de entradas pasadas */
  .entradas-panel {
    border-top: 1px dashed #ede4d4;
    padding: 12px 20px;
    display: none;
  }

  .entradas-panel.visible { display: block; }

  .entradas-titulo {
    font-size: 9px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .entrada-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 4px;
  }

  .entrada-item:last-child { border-bottom: none; }
  .entrada-item:hover { background: rgba(252,232,240,0.4); padding-left: 4px; }

  .entrada-fecha {
    font-size: 10px;
    color: #d4849e;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-width: 52px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .entrada-preview {
    font-size: 11.5px;
    color: #6a5a50;
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-style: italic;
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .btn-historial {
    background: none;
    border: 1px solid #ede4d4;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 10px;
    color: #9a8f82;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
  }
  .btn-historial:hover { background: #eaf4e8; border-color: #b8cbb4; color: #406038; }
</style>
</head>
<body>
<div class="widget">

  <div class="top-bar"></div>

  <div class="header">
    <div class="titulo">📝 notas del día</div>
    <div class="header-right">
      <span class="palabras-badge" id="palabras-badge">0 palabras</span>
      <span class="fecha-badge" id="fecha-badge">hoy</span>
    </div>
  </div>

  <div class="papel">
    <div class="textarea-wrap">
      <div class="lineas"></div>
      <textarea
        class="nota-textarea"
        id="nota-textarea"
        placeholder="¿qué está pasando hoy? escribe libremente... ✿"
        rows="6"
      ></textarea>
    </div>
  </div>

  <div class="footer-widget">
    <div class="footer-deco">✿ ── ✦</div>
    <div class="footer-actions">
      <span class="guardado" id="guardado">✓ guardado</span>
      <button class="nav-btn" onclick="navDia(-1)" title="día anterior">‹</button>
      <span class="nav-fecha" id="nav-fecha">hoy</span>
      <button class="nav-btn" onclick="navDia(1)"  title="día siguiente">›</button>
      <button class="btn-historial" onclick="toggleHistorial()">✦ diario</button>
    </div>
  </div>

  <div class="entradas-panel" id="entradas-panel">
    <div class="entradas-titulo">entradas recientes</div>
    <div id="entradas-lista"></div>
  </div>

</div>

<script>
const MESES_C = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIAS_N  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

const guardar = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} };
const leer    = (k,d) => { try { const v=localStorage.getItem(k); return v!==null?JSON.parse(v):d; } catch(e){return d;} };

const HOY = new Date();
HOY.setHours(0,0,0,0);
let fechaActual = new Date(HOY);

function claveNota(fecha) {
  return `nota_diario_${fecha.getFullYear()}_${fecha.getMonth()}_${fecha.getDate()}`;
}

function formatFecha(fecha) {
  const esHoy  = fecha.toDateString() === HOY.toDateString();
  const esAyer = (() => { const a = new Date(HOY); a.setDate(HOY.getDate()-1); return fecha.toDateString() === a.toDateString(); })();
  if (esHoy)  return 'hoy';
  if (esAyer) return 'ayer';
  return `${fecha.getDate()} ${MESES_C[fecha.getMonth()]}`;
}

function cargarDia(fecha) {
  const nota     = leer(claveNota(fecha), '');
  const textarea = document.getElementById('nota-textarea');
  textarea.value = nota;
  actualizarPalabras(nota);

  // Badges
  document.getElementById('fecha-badge').textContent =
    `${DIAS_N[fecha.getDay()]} ${fecha.getDate()} ${MESES_C[fecha.getMonth()]}`;
  document.getElementById('nav-fecha').textContent = formatFecha(fecha);

  // Deshabilitar siguiente si es hoy o futuro
  const navSig = document.querySelectorAll('.nav-btn')[1];
  navSig.style.opacity = fecha >= HOY ? '0.3' : '1';
  navSig.disabled      = fecha >= HOY;
}

function actualizarPalabras(texto) {
  const palabras = texto.trim() === '' ? 0 : texto.trim().split(/\s+/).length;
  document.getElementById('palabras-badge').textContent =
    `${palabras} ${palabras === 1 ? 'palabra' : 'palabras'}`;
}

// Guardar con debounce
let timer;
let guardadoTimer;
document.getElementById('nota-textarea').addEventListener('input', function() {
  clearTimeout(timer);
  actualizarPalabras(this.value);
  timer = setTimeout(() => {
    guardar(claveNota(fechaActual), this.value);
    const el = document.getElementById('guardado');
    el.classList.add('visible');
    clearTimeout(guardadoTimer);
    guardadoTimer = setTimeout(() => el.classList.remove('visible'), 2000);
    renderEntradas();
  }, 600);
});

function navDia(dir) {
  const nueva = new Date(fechaActual);
  nueva.setDate(nueva.getDate() + dir);
  if (nueva > HOY) return;
  fechaActual = nueva;
  cargarDia(fechaActual);
}

// Historial
function toggleHistorial() {
  const panel = document.getElementById('entradas-panel');
  panel.classList.toggle('visible');
  if (panel.classList.contains('visible')) renderEntradas();
}

function renderEntradas() {
  const lista = document.getElementById('entradas-lista');
  lista.innerHTML = '';

  // Buscar últimas 10 entradas
  const entradas = [];
  for (let i = 0; i < 60; i++) {
    const d = new Date(HOY);
    d.setDate(HOY.getDate() - i);
    const nota = leer(claveNota(d), '');
    if (nota.trim() !== '') {
      entradas.push({ fecha: d, nota });
      if (entradas.length >= 8) break;
    }
  }

  if (entradas.length === 0) {
    lista.innerHTML = '<div style="font-size:12px;color:#c8b8a8;font-style:italic;font-family:Noto Serif JP,serif;padding:4px 0;">aún no hay entradas... empieza hoy ✿</div>';
    return;
  }

  entradas.forEach(({ fecha, nota }) => {
    const item = document.createElement('div');
    item.className = 'entrada-item';
    item.innerHTML = `
      <span class="entrada-fecha">${fecha.getDate()} ${MESES_C[fecha.getMonth()]}</span>
      <span class="entrada-preview">${nota}</span>`;
    item.onclick = () => {
      fechaActual = new Date(fecha);
      cargarDia(fechaActual);
      document.getElementById('entradas-panel').classList.remove('visible');
    };
    lista.appendChild(item);
  });
}

// Iniciar
cargarDia(fechaActual);
</script>
</body>
</html>
